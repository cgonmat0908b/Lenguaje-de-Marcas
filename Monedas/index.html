<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Máquina de Pago</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Máquina de Pago</h1>
<br>

<label>Importe a pagar:</label>
<input type="number" id="importe" value="23">
<br>
<br>

<label>Cantidad pagada:</label>
<div id="pagado">0</div>

<h2>Monedas</h2>

<div class="monedas">
<button onclick="pagar(0.20)">0.20€</button>
<button onclick="pagar(0.50)">0.50€</button>
<button onclick="pagar(1)">1€</button>
</div>

<h2>Billetes</h2>

<div class="billetes">
<button onclick="pagar(5)">5€</button>
<button onclick="pagar(10)">10€</button>
<button onclick="pagar(20)">20€</button>
</div>

<h3 id="cambio"></h3>

<script src="scripts.js"></script>

</body>
</html>

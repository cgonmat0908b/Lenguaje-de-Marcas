<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador</title>
    <link rel="stylesheet" href="estilosContrasenyas.css">
</head>

<body>

    <h1>Validador De Contraseñas</h1>

    <label>Introduce la contraseña:</label><br><br>
    <input type="password" name="contrasenya" id="contrasenya" oninput="validar()"><br><br>

    
    <input type="checkbox" name="terminos" id="terminos" onclick="terminosMarcados()" onmouseover="mostrar()" onmouseleave="ocultar()">
    <label>Acepto los terminos y condiciones.</label><br><br>
    <div id="barra-fuerza"></div><br><br>
    
    <button id="enviar">Enviar</button>
    
    <br><br>
    <div id="terms">
        <p id="resumidos">Estos son los terminos resumidos</p>
    </div>
    
    <script src="scriptContrasenyas.js"></script>
</body>

</html>
